name: Génération signaux Prophet + Black-Litterman

on:
  workflow_run:
    workflows: ["Scraping BRVM quotidien"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_backtest:
        description: "Sauter le backtest walk-forward (rapide)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: brvm-generate-signals
  cancel-in-progress: false

jobs:
  generate:
    # Ne pas générer si le scraping a échoué.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (full history pour rebase)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (gate avant génération)
        run: pytest tests/ -q

      - name: Generate signals + portfolio
        run: |
          if [ "${{ inputs.skip_backtest }}" = "true" ]; then
            python pipeline/generate_signals.py --skip-backtest
          else
            python pipeline/generate_signals.py
          fi

      - name: Verify outputs exist
        run: |
          test -f data/signals/signals_latest.json
          test -f data/algo/portfolio_latest.json
          python -c "import json; json.load(open('data/signals/signals_latest.json'))"
          python -c "import json; json.load(open('data/algo/portfolio_latest.json'))"

      - name: Upload signals as artifact (audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_id }}
          path: |
            data/signals/signals_latest.json
            data/algo/portfolio_latest.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit & push des signaux
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals/ data/algo/
          if git diff --cached --quiet; then
            echo "Aucun changement de signaux."
          else
            git commit -m "signals: génération $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME:-main}" && \
                git push origin "HEAD:${GITHUB_REF_NAME:-main}" && break
              echo "Tentative $i échouée, on retente..."
              sleep 5
            done
          fi
