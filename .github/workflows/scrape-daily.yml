name: Scraping BRVM quotidien

on:
  schedule:
    # 17h00 UTC chaque jour ouvré (lun-ven). BRVM clôture vers 15h UTC.
    - cron: "0 17 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode de scraping"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - cours_only
          - dividendes_only
          - societes_only
          - news_only

permissions:
  contents: write

concurrency:
  group: scrape-brvm
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy

      - name: Scraping cours (actions + indices)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'full' || inputs.mode == 'cours_only' }}
        run: python scraper_brvm.py
        continue-on-error: true

      - name: Scraping fiches sociétés
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'full' || inputs.mode == 'societes_only' }}
        run: python scraper_info_societes.py
        continue-on-error: true

      - name: Scraping dividendes
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'full' || inputs.mode == 'dividendes_only' }}
        run: python scraper_dividendes.py
        continue-on-error: true

      - name: Scraping news
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'full' || inputs.mode == 'news_only' }}
        run: python scraper_news_brvm.py
        continue-on-error: true

      - name: Upload logs en artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit & push des données mises à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Aucune mise à jour de données — pas de commit."
          else
            git commit -m "data: scraping quotidien $(date -u +'%Y-%m-%d %H:%M UTC')"
            # retry simple en cas de course-condition (run manuel + cron)
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
              echo "Tentative $i échouée, on retente..."
              sleep 5
            done
          fi
