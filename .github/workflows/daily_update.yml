name: Composition flottante (post-scraping)

on:
  # Se déclenche automatiquement quand scrape-daily.yml se termine avec succès
  workflow_run:
    workflows: ["Scraping BRVM quotidien"]
    types: [completed]
  # Déclenchement manuel possible (utile pour forcer une regénération)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-composition:
    # En mode workflow_run, ne tourner que si le scraping a réussi
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (dernier commit, incluant les données fraîches)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Régénérer Composition_flottante.xlsx
        run: python pipeline/build_composition_flottante.py

      - name: Commit & push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/Composition_flottante.xlsx
          if git diff --cached --quiet; then
            echo "Aucun changement — pas de commit."
          else
            git commit -m "data: Composition_flottante.xlsx $(date -u +'%Y-%m-%d')"
            git push origin HEAD:main
          fi
