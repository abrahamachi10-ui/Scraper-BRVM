name: Daily BRVM Update

on:
  schedule:
    # 16h00 UTC = 16h00 WAT (heure BRVM), après clôture (15h30 WAT)
    - cron: "0 16 * * 1-5"
  workflow_dispatch: # déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Scrape cours historiques (incrémental)
        run: python scraper_brvm.py

      - name: Régénérer Composition_flottante.xlsx
        run: python build_composition_flottante.py

      - name: Commit & push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actions/ data/indices/ data/Composition_flottante.xlsx data/resume_scraping.csv
          # Ne committer que s'il y a des changements
          git diff --cached --quiet || git commit -m "chore: mise à jour quotidienne $(date -u +%Y-%m-%d)"
          git push
